name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
      - name: Verify the sample log raises high-severity alerts
        run: |
          if identitywatch scan examples/sample_auth_log.jsonl --fail-on high; then
            echo "ERROR: expected non-zero exit (high-severity alerts present)" && exit 1
          else
            echo "OK: high-severity alerts correctly produced a non-zero exit"
          fi
